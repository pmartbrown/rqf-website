name: Update daily Treasury rates
on:
  schedule:
    - cron: '20 22 * * 1-5'   # 5:20/6:20pm ET, after Treasury's ~4pm ET publish
  workflow_dispatch:
  push:
    paths: ['.github/workflows/update-rates.yml']
permissions:
  contents: write
jobs:
  rates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fetch 5-year Treasury par yield
        run: |
          python3 - <<'EOF'
          import json, urllib.request, xml.etree.ElementTree as ET, datetime, sys, os
          NS = {'d': 'http://schemas.microsoft.com/ado/2007/08/dataservices',
                'm': 'http://schemas.microsoft.com/ado/2007/08/dataservices/metadata'}
          def fetch(year):
              url = ('https://home.treasury.gov/resource-center/data-chart-center/'
                     'interest-rates/pages/xml?data=daily_treasury_yield_curve'
                     '&field_tdr_date_value=%d' % year)
              req = urllib.request.Request(url, headers={'User-Agent': 'RQF-rates/1.0'})
              return urllib.request.urlopen(req, timeout=90).read()
          def parse(raw):
              rows = []
              for e in ET.fromstring(raw).iter('{%s}properties' % NS['m']):
                  dt = e.find('d:NEW_DATE', NS); y5 = e.find('d:BC_5YEAR', NS)
                  if dt is not None and dt.text and y5 is not None and y5.text:
                      rows.append((dt.text[:10], float(y5.text)))
              return rows
          today = datetime.date.today()
          rows = parse(fetch(today.year))
          if not rows:
              rows = parse(fetch(today.year - 1))
          if not rows:
              sys.exit('no yield-curve data returned')
          as_of, val = max(rows)
          out = {'as_of': as_of, 'dgs5': round(val, 2),
                 'source': 'U.S. Treasury daily par yield curve (5-year)',
                 'fetched_at': datetime.datetime.utcnow().strftime('%Y-%m-%dT%H:%M:%SZ')}
          os.makedirs('assets', exist_ok=True)
          path = 'assets/rates.json'
          new = json.dumps(out)
          old = open(path).read().strip() if os.path.exists(path) else ''
          if old == new:
              print('unchanged:', new); sys.exit(0)
          open(path, 'w').write(new + '\n')
          print('updated:', new)
          EOF
      - name: Commit if changed
        run: |
          if ! git diff --quiet -- assets/rates.json; then
            git config user.name 'rqf-rates-bot'
            git config user.email 'github-actions[bot]@users.noreply.github.com'
            git add assets/rates.json
            git commit -m 'rates: daily 5Y Treasury update'
            git push
          fi
